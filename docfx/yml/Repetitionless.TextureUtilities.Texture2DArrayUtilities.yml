  assemblies:
  - com.williamschack.Repetitionless.TextureUtilities
  namespace: Repetitionless.TextureUtilities
  summary: >-
    Creates a new Texture2DArray with the given textures taking into account unsupported formats<br />

    Resolution will be the resolution of the first input texture<br />

    Texture will be skipped if it is not the same resolution of the first
  example: []
  syntax:
    content: public static Texture2DArray CreateArray(Texture2D[] textures, TextureFormat textureFormat, bool transferMipmaps = true, bool linear = false)
    parameters:
    - id: textures
      type: UnityEngine.Texture2D[]
      description: The textures that will be in the array
    - id: textureFormat
      type: UnityEngine.TextureFormat
      description: The texture format of the output array
    - id: transferMipmaps
      type: System.Boolean
      description: If mipmaps will be transferred from the textures to the array
    - id: linear
      type: System.Boolean
      description: >-
        If the output array will be linear<br />

        Recommended in the Built-In Render Pipeline only when including normal maps<br />

        <b>Not Recommended in URP/HDRP as it will result in brighter textures</b>
    return:
      type: UnityEngine.Texture2DArray
      description: A Texture2DArray with the input textures and settings
    content.vb: Public Shared Function CreateArray(textures As Texture2D(), textureFormat As TextureFormat, transferMipmaps As Boolean = True, linear As Boolean = False) As Texture2DArray
