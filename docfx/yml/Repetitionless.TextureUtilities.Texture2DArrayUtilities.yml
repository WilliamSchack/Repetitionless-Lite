  namespace: Repetitionless.TextureUtilities
  summary: >-
    Overwrites the texture in the input array at a given index to the input texture<br />

    Uses GPU functions to speed up operations<br />

    Update will not be applied if the texture resolution is not the same as the array
  example: []
  syntax:
    content: public static Texture2DArray UpdateTexture(Texture2DArray array, Texture2D texture, int index, bool transferMipmaps = true)
    parameters:
    - id: array
      type: UnityEngine.Texture2DArray
      description: The array that will be updated
    - id: texture
      type: UnityEngine.Texture2D
      description: The texture that will be inserted into the array
    - id: index
      type: System.Int32
      description: The index which the texture will overwrite
    - id: transferMipmaps
      type: System.Boolean
      description: If mipmaps will be transferred from the texture to the array if possible
    return:
      type: UnityEngine.Texture2DArray
      description: The modified array with the texture inserted
    content.vb: Public Shared Function UpdateTexture(array As Texture2DArray, texture As Texture2D, index As Integer, transferMipmaps As Boolean = True) As Texture2DArray
