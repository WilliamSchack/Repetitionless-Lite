  assemblies:
  - com.williamschack.Repetitionless.TextureUtilities
  namespace: Repetitionless.TextureUtilities
  summary: >-
    Creates a new Texture2DArray with the given textures taking into account unsupported formats<br />

    Resolution will be the resolution of the first input texture<br />

    Checks for user input to decide whether to resize the texture or array if a texture is at a different resolution to the array
  example: []
  syntax:
    content: public static Texture2DArray CreateArrayUserInput(Texture2D[] textures, TextureFormat textureFormat, int[] autoResizeIndexes = null, bool transferMipmaps = true, bool linear = false)
    parameters:
    - id: textures
      type: UnityEngine.Texture2D[]
      description: The textures that will be in the array
    - id: textureFormat
      type: UnityEngine.TextureFormat
      description: The texture format of the output array
    - id: autoResizeIndexes
      type: System.Int32[]
      description: >-
        Automatically resizes all textures at these indexes if required instead of showing a prompt to the user<br />

        Example: If this is { 0, 2 }, the textures at index 0 and 2 will be automatically resized
    - id: transferMipmaps
      type: System.Boolean
      description: If mipmaps will be transferred from the textures to the array
    - id: linear
      type: System.Boolean
      description: >-
        If the output array will be linear<br />

        Recommended in the Built-In Render Pipeline only when including normal maps<br />

        <b>Not Recommended in URP/HDRP as it will result in brighter textures</b>
    return:
      type: UnityEngine.Texture2DArray
      description: A Texture2DArray with the input textures and settings
    content.vb: Public Shared Function CreateArrayUserInput(textures As Texture2D(), textureFormat As TextureFormat, autoResizeIndexes As Integer() = Nothing, transferMipmaps As Boolean = True, linear As Boolean = False) As Texture2DArray
