      description: The width of the output texture
    - id: newHeight
      type: System.Int32
      description: The height of the output texture
    - id: filterMode
      type: UnityEngine.FilterMode
      description: The filter mode used when resizing the texture
    return:
      type: UnityEngine.Texture2D
      description: The texture resized to the input resolution
