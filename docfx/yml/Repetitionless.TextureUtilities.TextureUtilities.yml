  summary: >-
    Scales the input texture to the desired resolution<br />

    Does not modify the original texture, returns a new resized one
  example: []
  syntax:
    content: public static Texture2D ResizeTexture(Texture2D texture, int newWidth, int newHeight, FilterMode filterMode = FilterMode.Bilinear)
    parameters:
    - id: texture
      type: UnityEngine.Texture2D
      description: The texture that will be resized
    - id: newWidth
