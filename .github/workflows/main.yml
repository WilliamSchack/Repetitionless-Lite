name: Setup New Release

on:
  workflow_dispatch:
    inputs:
      release_notes_updated:
        description: 'Have you updated the release notes?'
        default: false
        required: true
        type: boolean
      version:
        description: 'Version tag (no leading "v")'
        default: ''
        required: true
        type: string

permissions:
  contents: write

jobs:
  validation:
    name: Validating Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validating Inputs
        if: ${{ github.event.inputs.release_notes_updated != 'true' }}
        run: exit 1

  update_files_and_build:
    name: Updating Files and Building Package
    runs-on: ubuntu-22.04
    needs: validation
    steps:
      - name: Free Up Storage
        uses: jlumbroso/free-disk-space@main
        with:
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false
      - uses: actions/checkout@v4
      - name: Install mkdocs
        working-directory: "Documentation"
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Docs
        working-directory: "Documentation"
        run: |
          mkdocs build
      - name: Move offline docs
        run: |
          mv "Documentation/site/pdf/document.pdf" "True Seamless Texturing/Packages/com.williamschack.repetitionless/OfflineDocumentation.pdf"
          rmdir "Documentation/site/pdf"
      - name: Write new version to package.json
        working-directory: "True Seamless Texturing/Packages/com.williamschack.repetitionless"
        run: |
          jq '.version = "${{ github.event.inputs.version }}"' package.json > package.tmp
          mv package.tmp package.json
      - name: Push changes
        run: |
          git config --global user.name '${{ secrets.GIT_USER_NAME }}'
          git config --global user.email '${{ secrets.GIT_USER_EMAIL }}'
          git add -A
          git commit -m '[automated commit] v${{ inputs.version }} Updated docs and package.json'
          git push
      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: "True Seamless Texturing/Library"
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-
      - name: Install Unity
        uses: buildalon/unity-setup@v2
        id: unity-setup
        with:
          version-file: 'True Seamless Texturing/ProjectSettings/ProjectVersion.txt'
          cache-installation: true
      - name: Activate Unity
        uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}
      - name: Export and Upload Package
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          PACKAGE_VERSION: ${{ github.event.inputs.version }}
        run: |
          "${{ steps.unity-setup.outputs.unity-editor-path }}" \
          -projectPath "${{ steps.unity-setup.outputs.unity-project-path }}" \
          -batchmode \
          -nographics \
          -executeMethod AutoPackageMaker.CreateAndUpload \
          -stackTraceLogType None \
          -logFile -
      - name: Upload Package Artifact
        uses: actions/upload-artifact@v6
        with:
          name: repetitionless-package
          path: ${{ env.PACKAGE_PATH }}

  create_release:
    name: Create Github Release
    runs-on: ubuntu-latest
    needs: update_files_and_build
    strategy:
      matrix:
        package-download-dir: [ opt ]
        release-notes-filename: [ ReleaseNotes.md ]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: ${{ matrix.release-notes-filename }}
      - name: Download Package
        uses: actions/download-artifact@v6
        with:
          name: repetitionless-package
          path: /${{ matrix.package-download-dir }}
      - name: Find Package
        run: |
          FILE=$(find ${{ matrix.package-download-dir }} -type f -name "*.unitypackage" | head -n 1)
          echo "PACKAGE_PATH=$FILE" >> $GITHUB_ENV
      - name: Get Release Notes
        id: release-notes
        run: |
          echo "release-notes=$(cat ${{ matrix.release-notes-filename }})" >> $GITHUB_OUTPUT
      - name: Create Github Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          body_path: ${{ matrix.release-notes-filename }}
          files: ${{ env.PACKAGE_PATH }}
